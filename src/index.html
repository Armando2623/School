<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SchoolGuard - Sistema de Registro de Visitas Escolares">
    <title>SchoolGuard - Registro de Visitas</title>

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Estilos de la aplicación -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <div class="app-container">

        <!-- Overlay para cerrar sidebar en mobile -->
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMobileSidebar()"></div>

        <div id="sidebar"></div>

        <main class="main-content">
            <!-- Topbar mobile (hamburguesa) -->
            <div class="mobile-topbar">
                <button class="btn-hamburger" onclick="toggleMobileSidebar()" aria-label="Abrir menú">
                    <i class="fas fa-bars"></i>
                </button>
                <span class="mobile-topbar-title" id="mobilePageTitle">Dashboard</span>
            </div>
            <div id="header"></div>
            <div id="app"></div>
        </main>

    </div>

    <!-- Contenedores de modales -->
    <div id="registerModalContainer"></div>
    <div id="confirmModalContainer"></div>
    <div id="toastContainerWrapper"></div>

    <!-- Scripts -->
    <!-- WebSocket: SockJS + STOMP (deben cargarse antes de chat.js) -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <!-- Supabase SDK & Config -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/env.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/config-service.js"></script>
    <!-- auth.js primero, para validar sesión antes de cargar la app -->
    <script src="js/auth.js"></script>
    <script>requireAuth();</script>
    <script src="js/loader.js"></script>
    <script src="js/router.js"></script>
    <!-- SheetJS — lectura de archivos Excel en el navegador -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
