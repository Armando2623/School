
<!-- Confirmation Modal -->
<div class="modal-overlay" id="confirmModal">
    <div class="modal confirm-modal">
        <div class="modal-header">
            <h3><i class="fas fa-question-circle"></i> Confirmar Acción</h3>
            <button class="modal-close" onclick="closeConfirmModal()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body">
            <p id="confirmMessage">¿Está seguro de realizar esta acción?</p>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeConfirmModal()">Cancelar</button>
            <button class="btn-confirm" id="confirmBtn">Confirmar</button>
        </div>
    </div>
</div>
