<!-- Register Modal -->
<div class="modal-overlay" id="registerModal">
    <div class="modal">
        <div class="modal-header">
            <h3><i class="fas fa-user-plus"></i> Registro Rápido</h3>
            <button class="modal-close" onclick="closeRegisterModal()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body">
            <form id="quickRegisterForm" onsubmit="quickRegister(event)">

                <!-- DNI con búsqueda automática -->
                <div class="form-group">
                    <label for="quickDocument"><i class="fas fa-id-card"></i> Documento *</label>
                    <div class="dni-input-wrapper">
                        <input type="text" id="quickDocument" required placeholder="Ingresa el DNI para buscar..."
                            maxlength="20" autocomplete="off">
                        <span class="dni-status" id="quickDniStatus" aria-live="polite"></span>
                    </div>
                </div>

                <!-- Banner visitante encontrado -->
                <div id="quickVisitorFound" class="visitor-found-banner" style="display:none; margin-bottom:10px;">
                    <i class="fas fa-check-circle"></i>
                    <span id="quickVisitorFoundMsg">Visitante encontrado.</span>
                </div>

                <!-- Nombre (se autocompleta) -->
                <div class="form-group">
                    <label for="quickName"><i class="fas fa-user"></i> Nombre del Visitante *</label>
                    <div class="dni-input-wrapper">
                        <input type="text" id="quickName" required placeholder="Se completa con el DNI...">
                        <span class="dni-status" id="quickNameStatus" aria-live="polite"></span>
                    </div>
                </div>

                <!-- Motivo -->
                <div class="form-group">
                    <label for="quickReason"><i class="fas fa-clipboard-list"></i> Motivo *</label>
                    <select id="quickReason" required>
                        <option value="">Seleccionar...</option>
                        <option value="Reunión Padres">Reunión de Padres</option>
                        <option value="Entrega Materiales">Entrega de Materiales</option>
                        <option value="Mantenimiento">Mantenimiento</option>
                        <option value="Evento Escolar">Evento Escolar</option>
                        <option value="Otro">Otro</option>
                    </select>
                </div>

                <!-- Persona a visitar con autocomplete -->
                <div class="form-group">
                    <label for="quickPerson"><i class="fas fa-user-tie"></i> Persona a Visitar *</label>
                    <input type="text" id="quickPerson" placeholder="Buscar usuario..." autocomplete="off" required>
                    <div id="suggestions" class="suggestions-box"></div>
                    <input type="hidden" id="usuarioId">
                </div>

            </form>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeRegisterModal()">Cancelar</button>
            <button class="btn-submit" onclick="quickRegister(event)">
                <i class="fas fa-check"></i> Registrar
            </button>
        </div>
    </div>
</div>
