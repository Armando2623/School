<!-- Register Modal -->
<div class="modal-overlay" id="registerModal">
    <div class="modal">
        <div class="modal-header">
            <h3><i class="fas fa-user-plus"></i> Registro Rápido</h3>
            <button class="modal-close" onclick="closeRegisterModal()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body">
            <form id="quickRegisterForm" onsubmit="quickRegister(event)">
                <div class="form-group">
                    <label for="quickName">Nombre del Visitante *</label>
                    <input type="text" id="quickName" required placeholder="Nombre completo">
                </div>
                <div class="form-group">
                    <label for="quickDocument">Documento *</label>
                    <input type="text" id="quickDocument" required placeholder="Número de documento">
                </div>
                <div class="form-group">
                    <label for="quickReason">Motivo *</label>
                    <select id="quickReason" required>
                        <option value="">Seleccionar...</option>
                        <option value="Reunión Padres">Reunión de Padres</option>
                        <option value="Entrega Materiales">Entrega de Materiales</option>
                        <option value="Mantenimiento">Mantenimiento</option>
                        <option value="Evento Escolar">Evento Escolar</option>
                        <option value="Otro">Otro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="quickPerson">Persona a Visitar *</label>
                    <input type="text" id="quickPerson" placeholder="Buscar usuario..." autocomplete="off" required>

                    <div id="suggestions" class="suggestions-box"></div>
                    <!-- guardará el id real del usuario -->
                    <input type="hidden" id="usuarioId">
                </div>


            </form>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeRegisterModal()">Cancelar</button>
            <button class="btn-submit" onclick="quickRegister(event)">Registrar</button>
        </div>
    </div>
</div>
