<!-- Módulo: Gestión de Usuarios del Sistema -->
<section class="content-section" id="usuariosSection">

    <div class="module-header">
        <div>
            <h2><i class="fas fa-users-cog"></i> Gestión de Usuarios</h2>
            <p>Administra los usuarios del sistema y sus roles de acceso</p>
        </div>
        <div>
            <button class="action-btn primary" onclick="showAddUsuarioForm()">
                <i class="fas fa-user-plus"></i> <span>Nuevo Usuario</span>
            </button>
        </div>
    </div>

    <!-- Formulario nueva / edición -->
    <div id="usuarioFormCard" class="form-card" style="display:none;">
        <div class="form-card-header">
            <h3 id="usuarioFormTitle"><i class="fas fa-user-plus"></i> Nuevo Usuario</h3>
            <button type="button" class="btn-icon" onclick="hideUsuarioForm()" title="Cerrar">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <form id="usuarioForm" onsubmit="submitUsuarioForm(event)">

            <div class="form-row">
                <div class="form-group">
                    <label for="uNombre"><i class="fas fa-id-card"></i> Nombre completo *</label>
                    <input type="text" id="uNombre" placeholder="Ej: María García" required maxlength="100">
                </div>

                <div class="form-group">
                    <label for="uUsuario"><i class="fas fa-user"></i> Nombre de usuario *</label>
                    <input type="text" id="uUsuario" placeholder="Ej: mgarcia" required autocomplete="off">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="uPassword"><i class="fas fa-lock"></i> Contraseña *</label>
                    <div class="dni-input-wrapper">
                        <input type="password" id="uPassword" placeholder="Mínimo 6 caracteres" required minlength="6"
                            autocomplete="new-password">
                        <button type="button" class="btn-icon" onclick="toggleUPwd()" title="Mostrar/ocultar">
                            <i class="fas fa-eye" id="uEyeIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="uRol"><i class="fas fa-shield-alt"></i> Rol *</label>
                    <select id="uRol" required>
                        <option value="">— Selecciona un rol —</option>
                        <option value="ADMINISTRADOR">Administrador</option>
                        <option value="SECRETARIA">Secretaria</option>
                        <option value="DIRECTOR">Director</option>
                        <option value="PORTERO">Portero</option>
                        <option value="PROFESOR">Profesor</option>
                    </select>
                </div>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-cancel" onclick="hideUsuarioForm()">
                    <i class="fas fa-times"></i> Cancelar
                </button>
                <button type="submit" class="btn-submit" id="btnSubmitUsuario">
                    <i class="fas fa-save"></i> Guardar Usuario
                </button>
            </div>

        </form>
    </div>

    <!-- Tabla de usuarios -->
    <div class="table-container">
        <table class="data-table" id="usuariosTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Usuario</th>
                    <th>Rol</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="usuariosTableBody">
                <tr>
                    <td colspan="5" class="loading-row">
                        <i class="fas fa-spinner fa-spin"></i> Cargando usuarios...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</section>
