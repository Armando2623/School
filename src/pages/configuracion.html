<div class="page-container page-configuracion animate-fade-in">
    <div class="page-header">
        <div>
            <h1 class="page-title">Configuración del Sistema</h1>
            <p class="page-subtitle">Personalice la información de su institución educativa</p>
        </div>
    </div>

    <div class="card form-card">
        <form id="configForm" class="visit-form">
            <div class="form-row">
                <!-- Nombre del Colegio -->
                <div class="form-group">
                    <label for="configNombre"><i class="fas fa-school"></i> Nombre de la Institución <span class="required">*</span></label>
                    <input type="text" id="configNombre" name="configNombre" required placeholder="Ej: Avícola Máncora / I.E. San Jorge">
                </div>

                <!-- Logo File -->
                <div class="form-group">
                    <label for="configLogo"><i class="fas fa-image"></i> Logo de la Institución</label>
                    <input type="file" id="configLogo" name="configLogo" accept="image/*">
                    <small style="color:var(--text-light); margin-top:5px; display:block;">Selecciona una imagen en tu computadora para usarla como logo (Opcional).</small>
                    <div style="margin-top: 10px;">
                        <img id="logoPreview" src="" alt="Vista previa del logo" style="max-height: 80px; max-width: 100%; display: none; border-radius: 4px; border: 1px solid var(--border-color); object-fit: contain;">
                    </div>
                </div>
            </div>

            <div class="form-row">
                <!-- Niveles -->
                <div class="form-group full-width">
                    <label for="configNiveles"><i class="fas fa-layer-group"></i> Niveles Educativos</label>
                    <input type="text" id="configNiveles" name="configNiveles" placeholder="Ej: Inicial, Primaria, Secundaria">
                </div>
            </div>

            <div class="form-row">
                <!-- Información Adicional -->
                <div class="form-group full-width">
                    <label for="configInfo"><i class="fas fa-info-circle"></i> Información Adicional</label>
                    <textarea id="configInfo" name="configInfo" rows="3" placeholder="Información de contacto, lema, o cualquier dato extra de la institución..."></textarea>
                </div>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-cancel" onclick="ConfiguracionManager.loadConfig()"><i class="fas fa-undo"></i> Restaurar</button>
                <button type="submit" class="btn-submit" id="btnSaveConfig"><i class="fas fa-save"></i> Guardar Configuración</button>
            </div>
        </form>
    </div>
</div>
